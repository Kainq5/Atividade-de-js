<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa registradora</title>
</head>
<body>
    <h1>Caixa registradora</h1>
    <form>
        <label for="produto">Produto:</label>
        <input type="text" id="produto" name="produto">
        <br>
        <label for="preco">Preço:</label>
        <input type="number" id="preco" name="preco">
        <br>
        <button type="button" onclick="tabela()">Adicionar</button>
    </form>
    <br>
    <table id="resultado" border="1">
        <thead>
            <tr>
                <th>Produto</th>
                <th>Preço</th>
            </tr>
        </thead>
        <tbody id="tabela_corpo">
        </tbody>
        <tfoot>
            <tr>
                <td>Total:</td>
                <td id="total">0</td>
            </tr>
        </tfoot>
    </table>
    <script src="26.js"></script>
</body>
</html>
