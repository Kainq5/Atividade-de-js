<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Conversor de Temperatura</title>
</head>
<body>
    <h1>Conversor de Temperatura</h1>
    
    <label for="valorOrigem">Temperatura:</label>
    <input type="number" id="valorOrigem" placeholder="Digite o valor">
    
    <select id="unidadeOrigem">
        <option value="celsius">Celsius</option>
        <option value="fahrenheit">Fahrenheit</option>
        <option value="kelvin">Kelvin</option>
    </select>

    <p>Para:</p>

    <select id="unidadeDestino">
        <option value="fahrenheit">Fahrenheit</option>
        <option value="celsius">Celsius</option>
        <option value="kelvin">Kelvin</option>
    </select>

    <br><br>
    <button onclick="converter()">Converter</button>

    <p>Resultado:</p>
    <input disabled type="text" id="resultado">

    <script src="17.js"></script>
</body>
</html>
